{% extends "base.html" %}

{% block title %}WiFi Vouchers{% endblock %}
{% block header_title %}WiFi Management{% endblock %}

{% block extra_head %}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
{% endblock %}

{% block content %}
<div x-data="voucherApp()" class="space-y-8">
    <div class="flex justify-between items-center bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
        <div class="flex gap-3">
            <label class="bg-emerald-600 text-white px-5 py-3 rounded-xl font-bold text-sm shadow-lg shadow-emerald-100 hover:bg-emerald-700 cursor-pointer transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                <span>Scan Excel</span>
                <input type="file" class="hidden" accept=".xlsx, .xls" @change="importExcel($event)">
            </label>
            <button @click="showModal = true" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-sm hover:bg-slate-800 transition-all">Add New</button>
        </div>
    </div>

    <template x-for="loc in locationMaster" :key="loc">
        <div class="space-y-4" x-show="voucherList.filter(v => v.location === loc).length > 0">
            <h2 class="text-xs font-black uppercase text-slate-400 tracking-widest" x-text="loc"></h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <template x-for="v in voucherList.filter(v => v.location === loc)" :key="v.voucher_code">
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm group hover:border-emerald-200 transition-all">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[10px] font-bold text-emerald-600 uppercase" x-text="v.user_name"></p>
                                <h3 class="text-xl font-black text-slate-800" x-text="v.voucher_code"></h3>
                            </div>
                            <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold" x-text="v.status"></span>
                        </div>
                        <div class="mt-4 flex gap-2">
                            <button @click="copyCode(v.voucher_code)" class="flex-1 bg-slate-50 text-slate-600 text-[10px] py-2 rounded-lg font-bold hover:bg-emerald-50 hover:text-emerald-600 transition-all">Copy Code</button>
                            <button @click="shareWA(v.user_name, v.voucher_code, v.location)" class="flex-1 bg-emerald-500 text-white text-[10px] py-2 rounded-lg font-bold hover:bg-emerald-600">Share WA</button>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </template>

    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">Create Voucher</h3>
            <input x-model="inputUser" type="text" placeholder="User Name" class="w-full mb-4 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-emerald-500">
            <input x-model="inputCode" type="text" placeholder="Voucher Code" class="w-full mb-4 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-emerald-500">
            <select x-model="inputLocation" class="w-full mb-6 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-emerald-500">
                <template x-for="loc in locationMaster" :key="loc">
                    <option :value="loc" x-text="loc"></option>
                </template>
            </select>
            <div class="flex gap-3">
                <button @click="showModal = false" class="flex-1 py-4 font-bold text-slate-400">Cancel</button>
                <button @click="addVoucher()" class="flex-1 py-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg">Save</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function voucherApp() {
        return {
            showModal: false,
            inputUser: '', inputCode: '', inputLocation: 'Office',
            locationMaster: ['Office', 'Warehouse', 'Production', 'Server Room', 'Lantai 1', 'Lantai 2'],
            voucherList: {{ vouchers|tojson if vouchers else [] }},
            
            async addVoucher(isSilent = false) {
                const payload = { user_name: this.inputUser || "User", voucher_code: this.inputCode, location: this.inputLocation };
                const res = await fetch('/vouchers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) {
                    this.voucherList.unshift({ ...payload, status: "Active" });
                    if(!isSilent) this.showModal = false;
                }
            },
            copyCode(code) { navigator.clipboard.writeText(code); alert('Copied!'); },
            shareWA(name, code, loc) {
                const msg = `Halo *${name}*, voucher WiFi lokasi *${loc}* kamu: *${code}*`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            },
            async importExcel(event) {
                // Logika import excel kamu yang lama masukkan di sini (tetap sama)
            }
        }
    }
</script>
{% endblock %}
