{% extends "base.html" %}
{% block title %}WiFi Vouchers{% endblock %}
{% block header_title %}WiFi Management{% endblock %}

{% block extra_head %}
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        .table-container { background: white; border-radius: 1.5rem; border: 1px solid #f1f5f9; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
        .btn-edit { background-color: #f0ad4e; color: white; padding: 6px 16px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        .btn-delete { background-color: #d9534f; color: white; padding: 6px 16px; border-radius: 6px; font-weight: bold; font-size: 12px; }
        [x-cloak] { display: none !important; }
    </style>
{% endblock %}

{% block content %}
<div x-data="voucherApp()" class="space-y-6">
    <div class="flex flex-wrap justify-between items-center gap-4">
        <div class="flex gap-3">
            <label class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-sm hover:bg-emerald-700 cursor-pointer transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                <span>Scan File</span>
                <input type="file" class="hidden" accept=".xlsx, .xls, .csv" @change="importExcel($event)">
            </label>
            <button @click="showModal = true" class="bg-slate-900 text-white px-6 py-2.5 rounded-lg font-bold text-sm hover:bg-slate-800 transition-all flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                Add Voucher
            </button>
        </div>
        <div class="flex gap-2 bg-white p-1 rounded-xl border border-slate-200">
             <button @click="exportExcel()" title="Excel" class="p-2.5 text-emerald-600 hover:bg-emerald-50 rounded-lg transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
             </button>
             <button @click="exportPDF()" title="PDF" class="p-2.5 text-red-600 hover:bg-red-50 rounded-lg transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg>
             </button>
        </div>
    </div>

    <div class="table-container">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-slate-100 bg-slate-50/50">
                    <th class="p-4 text-sm font-bold text-slate-700 w-12 text-center">No</th>
                    <th class="p-4 text-sm font-bold text-slate-700">Lokasi</th>
                    <th class="p-4 text-sm font-bold text-slate-700">Nama User</th>
                    <th class="p-4 text-sm font-bold text-slate-700">Voucher Code</th>
                    <th class="p-4 text-sm font-bold text-slate-700 text-center">Status</th>
                    <th class="p-4 text-sm font-bold text-slate-700 text-center">Opsi</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
                <template x-for="(v, index) in voucherList" :key="v.voucher_code">
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="p-4 text-sm text-slate-500 text-center" x-text="index + 1"></td>
                        <td class="p-4"><span class="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[11px] font-bold" x-text="v.location"></span></td>
                        <td class="p-4 text-sm font-semibold text-slate-700" x-text="v.user_name"></td>
                        <td class="p-4 font-mono text-sm font-bold text-emerald-600" x-text="v.voucher_code"></td>
                        <td class="p-4 text-center">
                            <template x-if="v.is_locked == true || v.is_locked == 1">
                                <span class="flex items-center justify-center text-red-500" title="Locked">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" /></svg>
                                </span>
                            </template>
                            <template x-if="!(v.is_locked == true || v.is_locked == 1)">
                                <span class="text-emerald-500 flex items-center justify-center" title="Available">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2V7a5 5 0 00-5-5zM7 7a3 3 0 016 0v2H7V7z" /></svg>
                                </span>
                            </template>
                        </td>
                        <td class="p-4 text-center">
                            <div class="flex justify-center gap-2">
                                <template x-if="v.is_locked == true || v.is_locked == 1">
                                    <button @click="unlockVoucher(v.voucher_code)" class="bg-indigo-500 text-white px-3 py-1.5 rounded-md text-[11px] font-bold hover:bg-indigo-600">Unlock</button>
                                </template>
                                <button @click="copyCode(v.voucher_code)" class="btn-edit">Copy</button>
                                <button @click="shareWA(v.user_name, v.location)" class="bg-emerald-500 text-white px-3 py-1.5 rounded-md text-[11px] font-bold">WA</button>
                                <button @click="deleteVoucher(v.voucher_code)" class="btn-delete">Hapus</button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>

    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
        <div @click.away="showModal = false" class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl border border-slate-100">
            <h3 class="text-xl font-bold text-slate-800 mb-6">Create Voucher</h3>
            <div class="space-y-4">
                <input x-model="inputUser" type="text" placeholder="User Name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                <input x-model="inputCode" type="text" placeholder="Voucher Code (Optional)" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                <select x-model="inputLocation" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-sm outline-none">
                    <template x-for="loc in locationMaster" :key="loc"><option :value="loc" x-text="loc"></option></template>
                </select>
                <div class="flex gap-3 pt-6">
                    <button @click="showModal = false" class="flex-1 py-3 font-bold text-slate-400">Batal</button>
                    <button @click="addVoucher()" class="flex-1 py-3 bg-[#2D5A57] text-white rounded-xl font-bold">Simpan</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function voucherApp() {
        return {
            showModal: false,
            inputUser: '', inputCode: '', inputLocation: 'Office',
            locationMaster: ['Office', 'Warehouse', 'Production', 'Server Room', 'Lantai 1', 'Lantai 2', 'Lantai 3', 'Lantai 4', 'Ekspedisi'],
            voucherList: {{ vouchers|tojson if vouchers else [] }},

            async unlockVoucher(code) {
                if(confirm('Buka kunci voucher ini?')) {
                    try {
                        const res = await fetch(`/vouchers/unlock/${code}`, { method: 'POST' });
                        if (res.ok) {
                            const index = this.voucherList.findIndex(v => v.voucher_code === code);
                            if (index !== -1) { 
                                this.voucherList[index].is_locked = false; 
                                this.voucherList = [...this.voucherList]; 
                            }
                        }
                    } catch (e) { alert("Error!"); }
                }
            },
            async addVoucher(isSilent = false) {
                const finalUser = this.inputUser || "User";
                const finalCode = this.inputCode || (finalUser.toUpperCase().replace(/\s/g, '') + "-" + Math.floor(1000 + Math.random() * 9000));
                const payload = { user_name: finalUser, voucher_code: finalCode, location: this.inputLocation };
                try {
                    const response = await fetch('/vouchers', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        this.voucherList.unshift({ ...payload, speed: "15Mbps", is_locked: false });
                        if (!isSilent) { this.showModal = false; this.inputUser = ''; this.inputCode = ''; }
                        return true;
                    }
                } catch (e) { return false; }
            },
            async deleteVoucher(code) {
                if(confirm('Hapus?')) {
                    try {
                        const res = await fetch(`/vouchers/delete/${code}`, { method: 'DELETE' });
                        if (res.ok) this.voucherList = this.voucherList.filter(v => v.voucher_code !== code);
                    } catch(e) { alert("Gagal!"); }
                }
            },
            exportPDF() {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const rows = this.voucherList.map((v, i) => [i+1, v.location, v.user_name, v.voucher_code, v.speed || '15Mbps', v.is_locked ? 'Locked' : 'Available']);
                doc.autoTable({ head: [['No', 'Location', 'User', 'Code', 'Speed', 'Status']], body: rows, startY: 20, theme: 'grid', headStyles: { fillColor: [45, 90, 87] } });
                doc.save("Voucher_Report.pdf");
            },
            exportExcel() {
                const data = this.voucherList.map(v => ({ 'Location': v.location, 'User': v.user_name, 'Code': v.voucher_code, 'Status': v.is_locked ? 'Locked' : 'Available' }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Vouchers");
                XLSX.writeFile(wb, "Nexus_Vouchers.xlsx");
            },
            copyCode(code) { navigator.clipboard.writeText(code); alert("Copied!"); },
            shareWA(name, loc) {
                const urlClaim = `${window.location.origin}/claim`;
                const msg = `Halo *${name}*,\n\nAmbil voucher WiFi lokasi *${loc}* di sini:\n🔗 ${urlClaim}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            },
            async importExcel(event) {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const jsonData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    for (const row of jsonData) {
                        this.inputUser = row["Nama depan"] || row["User"] || "User";
                        this.inputCode = row["Kode voucher"] || row["Code"] || "";
                        this.inputLocation = row["Lokasi"] || "Office";
                        if (this.inputCode) await this.addVoucher(true);
                    }
                    alert("Import Selesai!");
                };
                reader.readAsArrayBuffer(file);
            }
        }
    }
</script>
{% endblock %}
