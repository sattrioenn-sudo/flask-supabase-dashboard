<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - WiFi Vouchers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex" x-data="voucherApp()">

    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-bold text-xl">N</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-800">NEXUS</span>
            </div>
        </div>
        <nav class="flex-1 px-6 space-y-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4 mb-4">Main Menu</p>
            <a href="/dashboard" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Dashboard</a>
            <a href="/analytics" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Analytics</a>
            <a href="/vouchers" class="flex items-center gap-3 py-3 px-4 rounded-2xl bg-indigo-50 text-indigo-700 font-semibold shadow-sm shadow-indigo-100">WiFi Vouchers</a>
            <a href="/settings" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Settings</a>
        </nav>
    </aside>

    <main class="flex-1 flex overflow-hidden relative">
        <div class="flex-1 overflow-y-auto p-10 space-y-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800">WiFi Management</h1>
                    <p class="text-sm text-slate-400">Add user and generate access codes.</p>
                </div>
                <button @click="showModal = true" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    Add Voucher
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <template x-for="(v, index) in voucherList" :key="index">
                    <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group hover:border-indigo-200 transition-all">
                        <div class="flex justify-between items-start relative z-10">
                            <div>
                                <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest" x-text="'User: ' + v.user_name"></p>
                                <h3 class="text-2xl font-black text-slate-800 mt-1" x-text="v.voucher_code"></h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                    <p class="text-[11px] text-slate-400 font-bold" x-text="v.speed + ' Speed'"></p>
                                </div>
                            </div>
                            <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase" x-text="v.status"></span>
                        </div>
                        
                        <div class="mt-6 flex gap-2 relative z-10">
                            <button @click="copyCode(v.voucher_code)" class="flex-1 bg-slate-900 text-white text-[10px] py-3 rounded-xl font-bold hover:bg-slate-800 transition-all">Copy Code</button>
                            
                            <button @click="shareWA(v.user_name, v.voucher_code)" class="flex-1 bg-emerald-500 text-white text-[10px] py-3 rounded-xl font-bold hover:bg-emerald-600 transition-all flex items-center justify-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.246 2.248 3.484 5.232 3.484 8.412-.003 6.557-5.338 11.892-11.893 11.892-1.997-.001-3.951-.5-5.688-1.448l-6.309 1.656zm6.222-3.666l.449.266c1.353.803 2.898 1.226 4.476 1.227h.001c5.449 0 9.886-4.437 9.889-9.886.001-2.64-1.03-5.123-2.902-6.994s-4.355-2.903-6.992-2.903c-5.45 0-9.886 4.438-9.889 9.887-.001 1.745.459 3.447 1.332 4.931l.29.493-1.103 4.02 4.12-.108z"/></svg>
                                Share WA
                            </button>

                            <button @click="deleteVoucher(index)" class="p-3 bg-red-50 rounded-xl text-red-400 hover:text-red-600 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                        <div class="absolute -right-4 -bottom-4 w-20 h-20 bg-indigo-50/50 rounded-full group-hover:scale-150 transition-all"></div>
                    </div>
                </template>
            </div>
        </div>

        <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
            <div @click.away="showModal = false" class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-2">Create Voucher</h3>
                <p class="text-sm text-slate-400 mb-8">Enter user details for wifi access.</p>
                
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">User Name</label>
                        <input x-model="inputUser" type="text" placeholder="e.g. Satrio" class="w-full mt-2 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Voucher Code (Optional)</label>
                        <input x-model="inputCode" type="text" placeholder="e.g. SATRIO-FREE" class="w-full mt-2 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button @click="showModal = false" class="flex-1 py-4 rounded-2xl text-sm font-bold text-slate-400 hover:bg-slate-50 transition-all">Cancel</button>
                        <button @click="addVoucher()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl text-sm font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">Create Now</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function voucherApp() {
            return {
                showModal: false,
                inputUser: '',
                inputCode: '',
                voucherList: {{ vouchers|tojson if vouchers else [] }},
                
                async addVoucher() {
                    const finalUser = this.inputUser || "User";
                    const finalCode = this.inputCode || (finalUser.toUpperCase().replace(/\s/g, '') + "-" + Math.floor(1000 + Math.random() * 9000));
                    
                    const payload = {
                        user_name: finalUser,
                        voucher_code: finalCode
                    };

                    try {
                        const response = await fetch('/vouchers', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            this.voucherList.unshift({
                                user_name: finalUser,
                                voucher_code: finalCode,
                                speed: "10Mbps",
                                status: "Active"
                            });
                            this.showModal = false;
                            this.inputUser = '';
                            this.inputCode = '';
                        } else {
                            alert("Gagal menyimpan ke database Supabase!");
                        }
                    } catch (e) {
                        console.error(e);
                        alert("Terjadi kesalahan koneksi.");
                    }
                },

                copyCode(code) {
                    navigator.clipboard.writeText(code);
                    alert("Code " + code + " copied!");
                },

                // FUNGSI SHARE WHATSAPP BARU
                shareWA(name, code) {
                    const pesan = `Halo *${name}*, ini voucher WiFi Nexus kamu: \n\n🚀 Kode: *${code}* \n📶 Speed: 10Mbps \n\nSelamat internetan!`;
                    const url = `https://wa.me/?text=${encodeURIComponent(pesan)}`;
                    window.open(url, '_blank');
                },

                deleteVoucher(index) {
                    if(confirm('Delete this voucher?')) {
                        this.voucherList.splice(index, 1);
                    }
                }
            }
        }
    </script>
</body>
</html>
