<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - WiFi Vouchers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex" x-data="voucherApp()">

    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-bold text-xl">N</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-800">NEXUS</span>
            </div>
        </div>
        <nav class="flex-1 px-6 space-y-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4 mb-4">Main Menu</p>
            <a href="/dashboard" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Dashboard</a>
            <a href="/analytics" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Analytics</a>
            <a href="/vouchers" class="flex items-center gap-3 py-3 px-4 rounded-2xl bg-indigo-50 text-indigo-700 font-semibold shadow-sm shadow-indigo-100">WiFi Vouchers</a>
            <a href="/settings" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Settings</a>
        </nav>
    </aside>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="flex-1 overflow-y-auto p-10 space-y-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800">WiFi Management</h1>
                    <p class="text-sm text-slate-400">Manage and generate internet access for office guests.</p>
                </div>
                <button @click="generateVoucher()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    Generate Voucher
                </button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <template x-for="(v, index) in voucherList" :key="index">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden group hover:border-indigo-200 transition-all">
                        <div class="flex justify-between items-start relative z-10">
                            <div>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Voucher Code</p>
                                <h3 class="text-2xl font-black text-slate-800 mt-1" x-text="v.code"></h3>
                                <p class="text-xs text-indigo-500 font-bold mt-2" x-text="v.speed + ' Speed Limit'"></p>
                            </div>
                            <span :class="v.status === 'Active' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'" 
                                  class="px-3 py-1 rounded-full text-[10px] font-bold uppercase" x-text="v.status">
                            </span>
                        </div>
                        <div class="mt-6 flex gap-2 relative z-10">
                            <button @click="copyCode(v.code)" class="flex-1 bg-slate-900 text-white text-[10px] py-3 rounded-xl font-bold hover:bg-slate-800 transition-all flex items-center justify-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                                Copy Code
                            </button>
                            <button @click="deleteVoucher(index)" class="p-3 bg-red-50 rounded-xl text-red-400 hover:text-red-600 hover:bg-red-100 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                            </button>
                        </div>
                        <div class="absolute -right-4 -bottom-4 w-20 h-20 bg-indigo-50 rounded-full group-hover:scale-150 transition-all"></div>
                    </div>
                </template>
            </div>
        </div>

        <aside class="w-80 bg-white border-l border-slate-200 hidden xl:flex flex-col p-8 sticky top-0 h-screen">
            <h3 class="font-bold text-slate-800 mb-6">Network Insight</h3>
            <div class="space-y-4">
                <div class="p-6 bg-slate-900 rounded-[2rem] text-white">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Server Status</p>
                    <h4 class="text-xl font-bold mt-2 flex items-center gap-2">
                        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                        Operational
                    </h4>
                    <p class="text-[10px] text-slate-500 mt-4 leading-relaxed text-indigo-200">All voucher systems are running normally on Nexus Core.</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        function voucherApp() {
            return {
                // Inisialisasi data dari Flask (atau dummy jika Flask belum kirim data)
                voucherList: [
                    {code: "SATRIO-7721", speed: "10Mbps", status: "Active"},
                    {code: "SATRIO-1192", speed: "5Mbps", status: "Active"}
                ],
                
                // Fungsi Generate Voucher Baru
                generateVoucher() {
                    const randomId = Math.floor(1000 + Math.random() * 9000);
                    const newCode = "SATRIO-" + randomId;
                    this.voucherList.unshift({
                        code: newCode,
                        speed: "10Mbps",
                        status: "Active"
                    });
                },

                // Fungsi Copy Code
                copyCode(code) {
                    navigator.clipboard.writeText(code);
                    alert("Voucher " + code + " copied to clipboard!");
                },

                // Fungsi Delete
                deleteVoucher(index) {
                    if(confirm('Hapus voucher ini?')) {
                        this.voucherList.splice(index, 1);
                    }
                }
            }
        }
    </script>
</body>
</html>
