<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - WiFi Vouchers</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex" x-data="voucherApp()">

    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-bold text-xl">N</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-800">NEXUS</span>
            </div>
        </div>
        <nav class="flex-1 px-6 space-y-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4 mb-4">Main Menu</p>
            <a href="/dashboard" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Dashboard</a>
            <a href="/analytics" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Analytics</a>
            <a href="/vouchers" class="flex items-center gap-3 py-3 px-4 rounded-2xl bg-indigo-50 text-indigo-700 font-semibold shadow-sm shadow-indigo-100">WiFi Vouchers</a>
            <a href="/settings" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Settings</a>
        </nav>
    </aside>

    <main class="flex-1 flex overflow-hidden relative">
        <div class="flex-1 overflow-y-auto p-10 space-y-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-2xl font-extrabold text-slate-800">WiFi Management</h1>
                    <p class="text-sm text-slate-400">Vouchers grouped by location.</p>
                </div>
                <div class="flex gap-3">
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="bg-white border border-slate-200 text-slate-700 px-5 py-3 rounded-2xl font-bold text-sm shadow-sm hover:bg-slate-50 transition-all flex items-center gap-2">
                            Export
                        </button>
                        <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-40 bg-white border border-slate-100 rounded-xl shadow-xl z-30 overflow-hidden">
                            <button @click="exportExcel(); open = false" class="w-full text-left px-4 py-3 text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600">Export Excel</button>
                            <button @click="exportPDF(); open = false" class="w-full text-left px-4 py-3 text-xs font-bold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 border-t border-slate-50">Export PDF</button>
                        </div>
                    </div>

                    <button @click="showModal = true" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all flex items-center gap-2">
                        Add Voucher
                    </button>
                </div>
            </header>

            <template x-for="loc in locationMaster" :key="loc">
                <div class="space-y-4 mb-10" x-show="voucherList.filter(v => v.location === loc).length > 0">
                    <div class="flex items-center gap-4">
                        <h2 class="text-xs font-black uppercase tracking-widest text-slate-400" x-text="loc"></h2>
                        <div class="h-px flex-1 bg-slate-200/60"></div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <template x-for="(v, index) in voucherList.filter(v => v.location === loc)" :key="v.voucher_code">
                            <div class="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden group hover:border-indigo-200 transition-all">
                                <div class="flex justify-between items-start relative z-10">
                                    <div>
                                        <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest" x-text="'User: ' + v.user_name"></p>
                                        <h3 class="text-2xl font-black text-slate-800 mt-1" x-text="v.voucher_code"></h3>
                                        <div class="flex items-center gap-2 mt-2">
                                            <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                                            <p class="text-[11px] text-slate-400 font-bold" x-text="v.speed + ' Speed'"></p>
                                        </div>
                                    </div>
                                    <span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full text-[10px] font-bold uppercase" x-text="v.status"></span>
                                </div>
                                <div class="mt-6 flex gap-2 relative z-10">
                                    <button @click="copyCode(v.voucher_code)" class="flex-1 bg-slate-900 text-white text-[10px] py-3 rounded-xl font-bold hover:bg-slate-800 transition-all">Copy</button>
                                    <button @click="shareWA(v.user_name, v.voucher_code, v.location)" class="flex-1 bg-emerald-500 text-white text-[10px] py-3 rounded-xl font-bold hover:bg-emerald-600 transition-all flex items-center justify-center gap-1">
                                        Share WA
                                    </button>
                                    <button @click="deleteVoucher(v.voucher_code)" class="p-3 bg-red-50 rounded-xl text-red-400 hover:text-red-600 transition-all">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm">
            <div @click.away="showModal = false" class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-2">Create Voucher</h3>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">User Name</label>
                        <input x-model="inputUser" type="text" placeholder="Nama User" class="w-full mt-2 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Voucher Code</label>
                        <input x-model="inputCode" type="text" placeholder="Input kode manual" class="w-full mt-2 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Location</label>
                        <select x-model="inputLocation" class="w-full mt-2 bg-slate-50 border-none rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500">
                            <template x-for="loc in locationMaster" :key="loc">
                                <option :value="loc" x-text="loc"></option>
                            </template>
                        </select>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button @click="showModal = false" class="flex-1 py-4 font-bold text-slate-400 hover:bg-slate-50 rounded-2xl">Cancel</button>
                        <button @click="addVoucher()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg hover:bg-indigo-700">Create</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function voucherApp() {
            return {
                showModal: false,
                inputUser: '',
                inputCode: '',
                inputLocation: 'Office',
                locationMaster: ['Office', 'Warehouse', 'Production', 'Server Room', 'Lobby'],
                voucherList: {{ vouchers|tojson if vouchers else [] }},
                
                exportExcel() {
                    const sorted = [...this.voucherList].sort((a, b) => a.location.localeCompare(b.location));
                    const data = sorted.map(v => ({
                        'Location': v.location,
                        'User Name': v.user_name,
                        'Voucher Code': v.voucher_code,
                        'Speed': v.speed,
                        'Status': v.status
                    }));
                    const worksheet = XLSX.utils.json_to_sheet(data);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "Vouchers");
                    XLSX.writeFile(workbook, `Nexus_Report_${new Date().toLocaleDateString()}.xlsx`);
                },

                exportPDF() {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    const sorted = [...this.voucherList].sort((a, b) => a.location.localeCompare(b.location));
                    doc.text("Nexus WiFi Voucher Report", 14, 15);
                    const rows = sorted.map(v => [v.location, v.user_name, v.voucher_code, v.speed, v.status]);
                    doc.autoTable({
                        head: [['Location', 'User', 'Code', 'Speed', 'Status']],
                        body: rows,
                        startY: 20,
                        theme: 'grid'
                    });
                    doc.save(`Nexus_Report_${new Date().toLocaleDateString()}.pdf`);
                },

                async addVoucher() {
                    const finalUser = this.inputUser || "User";
                    // Jika inputCode kosong, generate otomatis
                    const finalCode = this.inputCode || (finalUser.toUpperCase().replace(/\s/g, '') + "-" + Math.floor(1000 + Math.random() * 9000));
                    
                    const payload = { 
                        user_name: finalUser, 
                        voucher_code: finalCode,
                        location: this.inputLocation 
                    };

                    try {
                        const response = await fetch('/vouchers', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (response.ok) {
                            this.voucherList.unshift({ ...payload, speed: "10Mbps", status: "Active" });
                            this.showModal = false;
                            this.inputUser = '';
                            this.inputCode = ''; // Reset input code
                        }
                    } catch (e) { alert("Error connecting to database."); }
                },

                copyCode(code) {
                    navigator.clipboard.writeText(code);
                    alert("Code copied!");
                },

                shareWA(name, code, loc) {
                    const pesan = `Halo *${name}* (${loc}), ini voucher WiFi Nexus kamu: \n\n🚀 Kode: *${code}* \n📶 Speed: 10Mbps`;
                    window.open(`https://wa.me/?text=${encodeURIComponent(pesan)}`, '_blank');
                },

                deleteVoucher(code) {
                    if(confirm('Delete this voucher?')) {
                        this.voucherList = this.voucherList.filter(v => v.voucher_code !== code);
                    }
                }
            }
        }
    </script>
</body>
</html>
