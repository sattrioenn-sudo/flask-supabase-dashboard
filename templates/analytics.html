{% extends "base.html" %}

{% block title %}Analytics{% endblock %}
{% block header_title %}Analytics Overview{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm">
        <div class="flex items-center justify-between mb-10">
            <div>
                <h3 class="text-xl font-bold text-slate-800">Weekly Distribution</h3>
                <p class="text-sm text-slate-400">Voucher usage analytics</p>
            </div>
            <select class="bg-slate-50 border-none rounded-xl text-xs font-bold p-3 text-slate-500 focus:ring-2 focus:ring-emerald-500">
                <option>Last 7 Days</option>
                <option>This Month</option>
            </select>
        </div>
        
        <div class="flex items-end justify-between gap-4 h-64 px-4 border-b border-slate-100 pb-2">
            <div class="w-full bg-slate-100 rounded-t-xl h-[40%] hover:bg-emerald-400 transition-all cursor-pointer"></div>
            <div class="w-full bg-emerald-600 rounded-t-xl h-[85%]"></div>
            <div class="w-full bg-slate-100 rounded-t-xl h-[60%] hover:bg-emerald-400 transition-all cursor-pointer"></div>
            <div class="w-full bg-emerald-500 rounded-t-xl h-[95%]"></div>
            <div class="w-full bg-slate-100 rounded-t-xl h-[30%] hover:bg-emerald-400 transition-all cursor-pointer"></div>
        </div>
        <div class="flex justify-between mt-4 px-4 text-[10px] font-bold text-slate-400 uppercase tracking-tighter">
            <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span>
        </div>
    </div>
</div>
{% endblock %}
