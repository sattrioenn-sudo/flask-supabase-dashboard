<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex">
    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-8"><div class="flex items-center gap-3"><div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200"><span class="text-white font-bold text-xl">N</span></div><span class="text-xl font-bold tracking-tight text-slate-800">NEXUS</span></div></div>
        <nav class="flex-1 px-6 space-y-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4 mb-4">Main Menu</p>
            <a href="/dashboard" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all">Dashboard</a>
            <a href="/analytics" class="flex items-center gap-3 py-3 px-4 rounded-2xl bg-indigo-50 text-indigo-700 font-semibold shadow-sm shadow-indigo-100">Analytics</a>
            <a href="/settings" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all">Settings</a>
        </nav>
        <div class="p-6 border-t border-slate-100"><a href="/logout" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-red-500 hover:bg-red-50 transition-all font-semibold text-sm text-red-500">Sign Out</a></div>
    </aside>

    <main class="flex-1">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-20 px-10 flex items-center justify-between">
            <h1 class="text-lg font-bold text-slate-800">Data Analytics</h1>
            <span class="text-sm text-slate-500">{{ email }}</span>
        </header>

        <div class="p-10 max-w-7xl mx-auto space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h3 class="font-bold mb-4">User Growth (Last 30 Days)</h3>
                    <div class="h-48 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-400">
                        [Chart Visualization Coming Soon]
                    </div>
                </div>
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm">
                    <h3 class="font-bold mb-4">System Performance</h3>
                    <div class="h-48 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200 flex items-center justify-center text-slate-400">
                        [Latency Graph Placeholder]
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
