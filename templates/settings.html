<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen flex">

    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <span class="text-white font-bold text-xl">N</span>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-800">NEXUS</span>
            </div>
        </div>
        <nav class="flex-1 px-6 space-y-2">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4 mb-4">Main Menu</p>
            <a href="/dashboard" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Dashboard</a>
            <a href="/analytics" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">Analytics</a>
            <a href="/vouchers" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-slate-500 hover:bg-slate-50 transition-all font-medium">WiFi Vouchers</a>
            <a href="/settings" class="flex items-center gap-3 py-3 px-4 rounded-2xl bg-indigo-50 text-indigo-700 font-semibold shadow-sm shadow-indigo-100">Settings</a>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <a href="/logout" class="flex items-center gap-3 py-3 px-4 rounded-2xl text-red-500 hover:bg-red-50 transition-all font-semibold text-sm">Sign Out</a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="h-20 bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-20 px-10 flex items-center justify-between">
            <h1 class="text-lg font-bold text-slate-800">Account Settings</h1>
            <div class="flex items-center gap-4">
                <span class="text-sm text-slate-500">{{ email }}</span>
                <div class="w-10 h-10 rounded-2xl bg-gradient-to-tr from-indigo-600 to-violet-600 p-[2px]">
                    <div class="w-full h-full bg-white rounded-[14px] flex items-center justify-center font-bold text-indigo-600">
                        {{ email[0] | upper }}
                    </div>
                </div>
            </div>
        </header>

        <div class="p-10 max-w-3xl mx-auto space-y-10">
            <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
                <h3 class="text-2xl font-bold mb-8">Informasi Akun</h3>
                <div class="space-y-6">
                    <div class="p-4 bg-slate-50 rounded-2xl">
                        <label class="text-xs font-bold text-slate-400 uppercase">Email Address</label>
                        <p class="text-slate-700 font-semibold">{{ email }}</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl">
                        <label class="text-xs font-bold text-slate-400 uppercase">User ID</label>
                        <p class="text-slate-400 text-xs font-mono truncate">{{ user_id }}</p>
                    </div>
                    <button class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100">
                        Update Password
                    </button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
