<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Modern Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h2 class="text-white text-xl font-bold tracking-wider">MY APP</h2>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="/dashboard" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 transition">Dashboard</a>
            <a href="#" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 transition">Analytics</a>
            <a href="/settings" class="block py-2.5 px-4 rounded-xl bg-blue-600 text-white font-medium">Settings</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="/logout" class="block py-2.5 px-4 rounded-xl text-red-400 hover:bg-red-500/10 transition font-medium">Logout</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white border-b border-slate-200 h-16 flex items-center px-8">
            <h1 class="text-lg font-semibold text-slate-800">Account Settings</h1>
        </header>

        <div class="p-8 max-w-2xl">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
                <h3 class="text-xl font-bold text-slate-800 mb-6">Profile Information</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-500">Email Address</label>
                        <p class="text-slate-900 font-semibold mt-1">{{ email }}</p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-500">User ID</label>
                        <p class="text-xs text-slate-400 font-mono mt-1">{{ user_id }}</p>
                    </div>
                    
                    <hr class="my-6 border-slate-100">
                    
                    <div class="pt-4">
                        <button class="bg-slate-100 text-slate-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-200 transition">
                            Change Password
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
