{% extends "base.html" %}

{% block title %}Settings{% endblock %}
{% block header_title %}Account Settings{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white p-10 rounded-[2.5rem] border border-slate-100 shadow-sm">
        <h3 class="text-xl font-bold text-slate-800 mb-8">Informasi Akun</h3>
        <div class="space-y-6">
            <div class="p-4 bg-slate-50 rounded-2xl">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Email Address</label>
                <p class="text-slate-700 font-bold">{{ email }}</p>
            </div>
            <div class="p-4 bg-slate-50 rounded-2xl">
                <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">User ID</label>
                <p class="text-slate-500 text-xs font-mono truncate">{{ user_id }}</p>
            </div>
            
            <hr class="border-slate-100 my-4">
            
            <button class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-100">
                Update Password
            </button>
            <p class="text-center text-[10px] text-slate-400 uppercase font-bold">Nexus System v2.0 - Pasuruan Plant</p>
        </div>
    </div>
</div>
{% endblock %}
