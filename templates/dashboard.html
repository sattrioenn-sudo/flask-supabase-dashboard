<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Modern Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex">

    <aside class="w-64 bg-slate-900 text-slate-300 flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h2 class="text-white text-xl font-bold tracking-wider">MY APP</h2>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="block py-2.5 px-4 rounded-xl bg-blue-600 text-white font-medium">Dashboard</a>
            <a href="#" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 transition">Analytics</a>
            <a href="#" class="block py-2.5 px-4 rounded-xl hover:bg-slate-800 transition">Settings</a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="/logout" class="block py-2.5 px-4 rounded-xl text-red-400 hover:bg-red-500/10 transition font-medium">
                Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8">
            <h1 class="text-lg font-semibold text-slate-800">Overview</h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm text-slate-500">{{ email }}</span>
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold text-xs">
                    {{ email[0] | uppercase }}
                </div>
            </div>
        </header>

        <div class="p-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm font-medium">Total Revenue</p>
                    <h3 class="text-2xl font-bold text-slate-900 mt-1">Rp 12.450.000</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm font-medium">Active Tasks</p>
                    <h3 class="text-2xl font-bold text-slate-900 mt-1">24 Projects</h3>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-500 text-sm font-medium">Storage Used</p>
                    <h3 class="text-2xl font-bold text-slate-900 mt-1">78%</h3>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-100">
                    <h3 class="font-bold text-slate-800">Recent Activity</h3>
                </div>
                <div class="p-6 text-slate-500 text-sm italic">
                    Welcome to your dashboard, <strong>{{ email }}</strong>. 
                    Semua sistem berjalan normal (Operational).
                </div>
            </div>
        </div>
    </main>

</body>
</html>
