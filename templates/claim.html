<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Wi-Fi Voucher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #fdfdfd;
        }
        [x-cloak] { display: none !important; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #e0e7ff 0%, #fae8ff 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 overflow-hidden relative">

    <div class="blob -top-20 -left-20 animate-pulse"></div>
    <div class="blob -bottom-20 -right-20" style="animation-delay: 2s;"></div>

    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#6366f1', '#ec4899', '#8b5cf6']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'Masukkan nama dulu bro!'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'Voucher sudah diklaim. Hubungi IT-Kemasan.';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    this.errorMsg = result.message;
                }
            } catch (e) {
                this.errorMsg = 'Gagal terhubung ke server.';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) {
                console.error('Lock failed');
            }
        }
    }" class="w-full max-w-sm">

        <div class="glass-card p-8 rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.1)] relative overflow-hidden text-center">
            
            <div class="relative w-20 h-20 bg-white rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-sm border border-slate-100">
                <div class="absolute inset-0 bg-indigo-500/5 rounded-3xl animate-ping"></div>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-600 relative z-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
                </svg>
            </div>

            <template x-if="!voucher">
                <div class="fade-in">
                    <h1 class="text-2xl font-extrabold text-slate-900 mb-2">Wi-Fi Access</h1>
                    <p class="text-sm text-slate-500 mb-8 px-4 font-medium">Input nama Anda untuk mendapatkan akses internet kantor.</p>
                    
                    <div class="relative mb-4 group">
                        <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Siapa nama kamu?" 
                               class="w-full px-6 py-5 bg-slate-50 border border-slate-200 rounded-2xl text-center font-bold text-slate-800 placeholder:text-slate-400 focus:ring-4 focus:ring-indigo-500/5 focus:border-indigo-500 focus:bg-white outline-none transition-all duration-300">
                    </div>
                    
                    <button @click="getVoucher()" :disabled="loading"
                            class="w-full py-5 bg-slate-900 text-white rounded-2xl font-bold shadow-xl shadow-slate-200 hover:bg-indigo-600 hover:shadow-indigo-200 active:scale-[0.98] transition-all duration-300 disabled:opacity-50">
                        <span x-show="!loading" class="flex items-center justify-center gap-2">
                            Generate Voucher
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 opacity-50" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                            </svg>
                        </span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                             <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                             Processing...
                        </span>
                    </button>
                    <p x-text="errorMsg" class="text-rose-500 text-xs font-bold mt-4 px-4 py-2 bg-rose-50 rounded-lg inline-block" x-show="errorMsg" x-cloak></p>
                </div>
            </template>

            <template x-if="voucher">
                <div class="fade-in">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold uppercase tracking-wider rounded-full mb-4">
                        <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                        Voucher Active
                    </div>
                    <h2 class="text-xl font-bold text-slate-900 mb-6" x-text="'Halo, ' + voucher.user_name"></h2>
                    
                    <div class="relative py-10 bg-slate-900 rounded-[2rem] mb-6 overflow-hidden shadow-2xl group cursor-pointer" 
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Kode disalin!')">
                        <div class="shimmer absolute inset-0 opacity-20"></div>
                        <p class="relative z-10 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em] mb-2">Voucher Code</p>
                        <h1 class="relative z-10 text-4xl font-black text-white tracking-widest group-hover:scale-110 transition-transform duration-300" x-text="voucher.voucher_code"></h1>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-8">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <p class="text-slate-400 font-bold uppercase mb-1" style="font-size: 8px;">Max Speed</p>
                            <p class="font-black text-slate-800 text-sm" x-text="voucher.speed || '15 Mbps'"></p>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <p class="text-slate-400 font-bold uppercase mb-1" style="font-size: 8px;">Zone</p>
                            <p class="font-black text-slate-800 text-sm" x-text="voucher.location"></p>
                        </div>
                    </div>
                    
                    <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Kode disalin!')" 
                            class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-100 flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                        </svg>
                        Salin Kode
                    </button>
                    
                    <button @click="voucher = null; inputName = ''" class="mt-8 text-[10px] font-extrabold text-slate-400 hover:text-indigo-600 uppercase tracking-widest transition-colors flex items-center justify-center mx-auto gap-2">
                        <span>← Logout / Selesai</span>
                    </button>
                </div>
            </template>

        </div>
        
        <div class="mt-10 text-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em]">Designed by Satrio Eko</p>
            <div class="h-1 w-8 bg-indigo-500 mx-auto mt-2 rounded-full opacity-30"></div>
        </div>
    </div>

</body>
</html>
