<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Wi-Fi Voucher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a; /* Slate 900 */
        }
        [x-cloak] { display: none !important; }
        
        .bg-mesh {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(222,47%,11%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(217,91%,60%,0.15) 0, transparent 50%), 
                radial-gradient(at 50% 100%, hsla(217,91%,60%,0.1) 0, transparent 50%);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(59,130,246,0) 0%, rgba(59,130,246,0.2) 50%, rgba(59,130,246,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .glow-button {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-mesh relative overflow-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[120px]"></div>

    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#3b82f6', '#60a5fa', '#ffffff']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'Ketik namamu dulu, Bos!'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'Voucher sudah diklaim. Hubungi IT Support.';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    this.errorMsg = result.message;
                }
            } catch (e) {
                this.errorMsg = 'Koneksi bermasalah.';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) {
                console.error('Lock failed');
            }
        }
    }" class="w-full max-w-sm z-10">

        <div class="glass-card p-10 rounded-[2.5rem] shadow-2xl relative overflow-hidden text-center border border-blue-500/20">
            
            <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 glow-button">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" />
                </svg>
            </div>

            <template x-if="!voucher">
                <div class="animate-in fade-in duration-700">
                    <h1 class="text-2xl font-black text-white mb-2 tracking-tight">Wi-Fi Claim</h1>
                    <p class="text-xs text-blue-200/60 mb-8 uppercase tracking-[0.2em] font-bold">IT Department Portal</p>
                    
                    <div class="relative mb-4">
                        <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Input Nama..." 
                               class="w-full px-6 py-5 bg-white/5 border border-white/10 rounded-2xl text-center font-bold text-white placeholder:text-slate-500 focus:ring-2 focus:ring-blue-500 focus:bg-white/10 outline-none transition-all duration-300">
                    </div>
                    
                    <button @click="getVoucher()" :disabled="loading"
                            class="w-full py-5 bg-blue-600 text-white rounded-2xl font-extrabold shadow-lg hover:bg-blue-500 active:scale-95 transition-all disabled:opacity-50 glow-button">
                        <span x-show="!loading" class="tracking-wider uppercase text-sm">Get Voucher Now</span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                             <svg class="animate-spin h-5 w-5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                             Authenticating...
                        </span>
                    </button>
                    <p x-text="errorMsg" class="text-red-400 text-[10px] font-black mt-5 uppercase tracking-widest bg-red-500/10 py-2 rounded-lg" x-show="errorMsg" x-cloak></p>
                </div>
            </template>

            <template x-if="voucher">
                <div class="animate-in zoom-in duration-500">
                    <div class="inline-block px-4 py-1 bg-blue-500/20 text-blue-400 text-[10px] font-black uppercase tracking-[0.2em] rounded-full mb-4">Authorized Access</div>
                    <h2 class="text-xl font-bold text-white mb-6" x-text="voucher.user_name"></h2>
                    
                    <div class="relative py-12 bg-slate-950/80 border border-blue-500/30 rounded-[2rem] mb-6 overflow-hidden shadow-inner group cursor-pointer" 
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Kode berhasil disalin!')">
                        <div class="shimmer absolute inset-0"></div>
                        <p class="relative z-10 text-[9px] font-bold text-blue-400/50 uppercase tracking-[0.3em] mb-2">Voucher Key</p>
                        <h1 class="relative z-10 text-4xl font-black text-white tracking-[0.2em] group-hover:scale-105 transition-transform" x-text="voucher.voucher_code"></h1>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-8">
                        <div class="p-4 bg-white/5 border border-white/5 rounded-2xl">
                            <p class="text-blue-400/40 font-bold uppercase mb-1" style="font-size: 8px;">Network</p>
                            <p class="font-black text-white text-xs" x-text="voucher.speed || '15Mbps'"></p>
                        </div>
                        <div class="p-4 bg-white/5 border border-white/5 rounded-2xl">
                            <p class="text-blue-400/40 font-bold uppercase mb-1" style="font-size: 8px;">Area</p>
                            <p class="font-black text-white text-xs" x-text="voucher.location"></p>
                        </div>
                    </div>
                    
                    <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Kode berhasil disalin!')" 
                            class="w-full py-4 bg-white text-slate-900 rounded-xl font-black hover:bg-blue-50 transition-all flex items-center justify-center gap-2">
                        COPY CODE
                    </button>
                    
                    <button @click="voucher = null; inputName = ''" class="mt-8 text-[10px] font-bold text-slate-500 hover:text-blue-400 uppercase tracking-widest transition-colors">
                        ← Exit Session
                    </button>
                </div>
            </template>

        </div>
        
        <div class="mt-10 text-center space-y-2">
            <p class="text-[10px] font-black text-blue-500/40 uppercase tracking-[0.5em]">Design by Satrio Eko</p>
            <div class="flex justify-center gap-1">
                <div class="h-1 w-1 bg-blue-600 rounded-full"></div>
                <div class="h-1 w-4 bg-blue-600 rounded-full"></div>
                <div class="h-1 w-1 bg-blue-600 rounded-full"></div>
            </div>
        </div>
    </div>

</body>
</html>
