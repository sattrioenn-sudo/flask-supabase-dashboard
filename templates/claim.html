<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Kemasan Ciptatama Sempurna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #ffffff; 
            overflow: hidden;
        }
        [x-cloak] { display: none !important; }

        /* Container Background */
        .bg-kcs-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }
        
        .bg-kcs-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .marquee-glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #0ea5e9;
        }
        
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 35s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* REVISI: Kotak Transparan (Glassmorphism) */
        .card-kcs {
            background: rgba(255, 255, 255, 0.4); /* Opasitas dikurangi agar lebih transparan */
            backdrop-filter: blur(20px); /* Efek blur kaca diperkuat */
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border-radius: 3rem;
        }

        .shiny-voucher-kcs {
            background: linear-gradient(110deg, #075985 0%, #0ea5e9 50%, #075985 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.4);
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-kcs-container">
        <img src="https://imgs.search.brave.com/yrr_jlT-frCPUQ5xMZ2xxCHFuFN5NIH_D5Dmtcb2kJw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9rZW1h/c2FuY2lwdGEuY29t/L3dwLWNvbnRlbnQv/dXBsb2Fkcy8yMDIx/LzAxL2Nyb3BwZWQt/Y3JvcHBlZC1XRUJT/SVRFLUtDUy1sb2dv/LTIwMjUucG5n" alt="Logo KCS">
    </div>

    <div class="fixed top-0 w-full marquee-glass z-50 py-3">
        <div class="marquee-text">
            <span class="text-sky-600 font-bold text-[11px] tracking-[0.25em] uppercase">
                PT. Kemasan Ciptatama Sempurna Wi-Fi Service — Please enter your name to claim your voucher — Use internet wisely for productivity — Support: IT Department (08113219556) —
            </span>
        </div>
    </div>

    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        showNotif: false,
        launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#0ea5e9', '#ffffff', '#075985']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'NAMA DIPERLUKAN'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'MAAF, VOUCHER SUDAH TERPAKAI.';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.showNotif = true;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    this.errorMsg = result.message.toUpperCase();
                }
            } catch (e) {
                this.errorMsg = 'SERVER OFFLINE.';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) { console.error('Lock failed'); }
        }
    }" class="w-full max-w-sm">

        <div class="card-kcs p-10 relative overflow-hidden group">
            <template x-if="!voucher">
                <div class="animate-in fade-in zoom-in duration-500">
                    <div class="relative w-24 h-24 mx-auto mb-8">
                        <div class="absolute inset-0 bg-sky-400 blur-3xl opacity-20 animate-pulse"></div>
                        <div class="relative bg-white border-2 border-sky-100 rounded-3xl w-full h-full flex items-center justify-center shadow-lg">
                            <svg class="w-12 h-12 text-sky-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </div>
                    </div>

                    <div class="text-center mb-10">
                        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">KEMASAN <span class="text-sky-600">CIPTA</span></h1>
                        <p class="text-[10px] font-bold text-sky-500 uppercase tracking-[0.3em] mt-1">Wi-Fi Voucher Claim</p>
                    </div>
                    
                    <div class="space-y-5">
                        <!-- Input juga dibuat semi-transparan agar serasi -->
                        <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Employee Name" 
                               class="w-full bg-white/50 backdrop-blur-sm border-2 border-slate-200/50 rounded-2xl py-4 px-6 text-center font-bold text-slate-700 focus:bg-white focus:border-sky-500 transition-all outline-none">
                        
                        <button @click="getVoucher()" :disabled="loading"
                                class="w-full py-5 bg-sky-600 text-white rounded-2xl font-black text-xs tracking-[0.2em] uppercase hover:bg-sky-700 shadow-xl active:scale-95 disabled:opacity-50">
                            <span x-show="!loading">GET ACCESS VOUCHER</span>
                            <span x-show="loading" class="flex items-center justify-center gap-3">
                                <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                PROCESSING
                            </span>
                        </button>
                    </div>
                    <p x-show="errorMsg" x-text="errorMsg" class="mt-6 text-center text-red-500 text-[10px] font-black tracking-widest"></p>
                </div>
            </template>

            <template x-if="voucher">
                <div class="animate-in slide-in-from-bottom-8 duration-500">
                    <div x-show="showNotif" class="bg-sky-50/80 backdrop-blur-sm flex items-center justify-center gap-2 px-4 py-2 rounded-full mb-6 mx-auto w-fit border border-sky-200">
                        <span class="flex h-2 w-2 rounded-full bg-sky-500"></span>
                        <span class="text-[10px] font-extrabold text-sky-700 uppercase">Voucher Successfully Claimed</span>
                    </div>

                    <h2 class="text-xl font-bold text-slate-800 text-center mb-8">Hello, <br><span x-text="voucher.user_name" class="text-sky-600 font-black"></span></h2>
                    
                    <div class="shiny-voucher-kcs rounded-[2.5rem] py-10 px-4 mb-6 cursor-pointer text-center" 
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Token Copied!')">
                        <p class="text-[9px] font-bold text-white/70 uppercase tracking-[0.3em] mb-2">Wi-Fi Token Code</p>
                        <h1 class="text-4xl font-black text-white tracking-[0.1em] drop-shadow-xl" x-text="voucher.voucher_code"></h1>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="p-4 bg-white/50 backdrop-blur-sm rounded-2xl border border-sky-100 text-center">
                            <p class="text-sky-400 font-bold uppercase mb-1" style="font-size: 8px;">Network Speed</p>
                            <p class="font-black text-sky-800 text-xs" x-text="voucher.speed || '15 Mbps'"></p>
                        </div>
                        <div class="p-4 bg-white/50 backdrop-blur-sm rounded-2xl border border-sky-100 text-center">
                            <p class="text-sky-400 font-bold uppercase mb-1" style="font-size: 8px;">Device Status</p>
                            <p class="font-black text-sky-800 text-xs text-green-600 uppercase">Verified</p>
                        </div>
                    </div>
                    
                    <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Berhasil disalin!')" 
                            class="w-full py-4 bg-sky-600 text-white rounded-2xl font-black text-[11px] tracking-widest shadow-lg">
                        COPY TOKEN
                    </button>
                    
                    <button @click="voucher = null; inputName = ''; showNotif = false" class="w-full mt-6 text-[9px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest text-center">
                        Clear & Exit
                    </button>
                </div>
            </template>
        </div>
        
        <div class="mt-12 text-center">
            <div class="inline-block px-8 py-3 bg-white/50 backdrop-blur-md shadow-sm rounded-full border border-sky-100/50">
                <p class="text-[10px] font-bold text-sky-600/60 uppercase tracking-[0.4em]">Developed By IT SATRIO</p>
            </div>
        </div>
    </div>
</body>
</html>
