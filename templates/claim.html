<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Kemasan Ciptatama Sempurna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }

        /* REVISI: Background Gedung Modern */
        .bg-office {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.75)), 
                              url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            filter: saturate(1.1);
        }

        .blob {
            position: absolute;
            width: 600px; height: 600px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2) 0%, rgba(30, 64, 175, 0.2) 100%);
            filter: blur(100px);
            border-radius: 50%;
            animation: move 25s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(15%, 15%) scale(1.1); }
        }

        .marquee-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 30s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        .card-3d {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 1);
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(59, 130, 246, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card-3d:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .shiny-voucher {
            background: linear-gradient(110deg, #1e3a8a 0%, #3b82f6 50%, #1e3a8a 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
            box-shadow: 0 15px 35px -10px rgba(59, 130, 246, 0.5);
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .notif-badge {
            background: #f8fafc;
            border: 1px solid #3b82f6;
            animation: pulse-border 2s infinite;
        }
        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-office"></div>
    <div class="fixed inset-0 overflow-hidden -z-10">
        <div class="blob" style="top: -150px; left: -150px;"></div>
        <div class="blob" style="bottom: -150px; right: -150px; animation-delay: -5s;"></div>
    </div>

    <div class="fixed top-0 w-full marquee-glass z-50 py-3">
        <div class="marquee-text">
            <span class="text-blue-400 font-bold text-[11px] tracking-[0.25em] uppercase">
                PT. Kemasan Ciptatama Sempurna Wi-Fi Service — Please enter your name to claim your voucher — Use internet wisely for productivity — Support: IT Department (08113219556) —
            </span>
        </div>
    </div>

    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        showNotif: false,
        launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#3b82f6', '#ffffff', '#1e3a8a']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'NAMA DIPERLUKAN'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'MAAF, VOUCHER SUDAH TERPAKAI.';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.showNotif = true;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    this.errorMsg = result.message.toUpperCase();
                }
            } catch (e) {
                this.errorMsg = 'SERVER OFFLINE.';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) { console.error('Lock failed'); }
        }
    }" class="w-full max-w-sm">

        <div class="card-3d p-10 rounded-[3rem] relative overflow-hidden group">
            
            <template x-if="!voucher">
                <div class="animate-in fade-in zoom-in duration-500">
                    <div class="relative w-24 h-24 mx-auto mb-8">
                        <div class="absolute inset-0 bg-blue-500 blur-3xl opacity-20 animate-pulse"></div>
                        <div class="relative bg-gradient-to-br from-blue-700 to-blue-500 rounded-3xl w-full h-full flex items-center justify-center shadow-2xl transform transition-transform duration-500 group-hover:scale-105">
                            <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                        </div>
                    </div>

                    <div class="text-center mb-10">
                        <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Kemasan Cipta</h1>
                        <p class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.3em] mt-1">Wi-Fi Voucher Claim</p>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="relative">
                            <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Employee Name" 
                                   class="w-full bg-slate-100 border-2 border-slate-200 rounded-2xl py-4 px-6 text-center font-bold text-slate-800 placeholder:text-slate-400 focus:bg-white focus:border-blue-500 transition-all outline-none">
                        </div>
                        
                        <button @click="getVoucher()" :disabled="loading"
                                class="w-full py-5 bg-slate-900 text-white rounded-2xl font-black text-xs tracking-[0.2em] uppercase hover:bg-blue-600 transition-all shadow-xl active:scale-95 disabled:opacity-50">
                            <span x-show="!loading">GET ACCESS VOUCHER</span>
                            <span x-show="loading" class="flex items-center justify-center gap-3 italic">
                                <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                PROCESSING
                            </span>
                        </button>
                    </div>

                    <p x-show="errorMsg" x-text="errorMsg" class="mt-6 text-center text-red-500 text-[10px] font-black tracking-widest"></p>
                </div>
            </template>

            <template x-if="voucher">
                <div class="animate-in slide-in-from-bottom-8 duration-500">
                    
                    <div x-show="showNotif" class="notif-badge flex items-center justify-center gap-2 px-4 py-2 rounded-full mb-6 mx-auto w-fit">
                        <span class="flex h-2 w-2 rounded-full bg-green-500"></span>
                        <span class="text-[10px] font-extrabold text-slate-600 uppercase tracking-tighter">Voucher Successfully Claimed</span>
                    </div>

                    <h2 class="text-xl font-bold text-slate-900 text-center mb-8">Hello, <br><span x-text="voucher.user_name" class="text-blue-600 font-black"></span></h2>
                    
                    <div class="shiny-voucher rounded-[2.5rem] py-10 px-4 mb-6 cursor-pointer transform transition-all text-center" 
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Token Copied!')">
                        <p class="text-[9px] font-bold text-white/60 uppercase tracking-[0.3em] mb-2">Wi-Fi Token Code</p>
                        <h1 class="text-4xl font-black text-white tracking-[0.1em] drop-shadow-xl" x-text="voucher.voucher_code"></h1>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-inner text-center">
                            <p class="text-slate-400 font-bold uppercase mb-1" style="font-size: 8px;">Network Speed</p>
                            <p class="font-black text-slate-800 text-xs" x-text="voucher.speed || '15 Mbps'"></p>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 shadow-inner text-center">
                            <p class="text-slate-400 font-bold uppercase mb-1" style="font-size: 8px;">Device Status</p>
                            <p class="font-black text-slate-800 text-xs text-green-600 uppercase">Verified</p>
                        </div>
                    </div>
                    
                    <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Berhasil disalin!')" 
                            class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black text-[11px] tracking-widest hover:bg-blue-700 transition-all shadow-lg">
                        COPY TOKEN
                    </button>
                    
                    <button @click="voucher = null; inputName = ''; showNotif = false" class="w-full mt-6 text-[9px] font-bold text-slate-400 hover:text-red-500 uppercase tracking-widest transition-colors text-center">
                        Clear & Exit
                    </button>
                </div>
            </template>
        </div>
        
        <div class="mt-12 text-center">
            <div class="inline-block px-8 py-3 bg-white/10 backdrop-blur-md rounded-full border border-white/20">
                <p class="text-[10px] font-bold text-white/60 uppercase tracking-[0.4em]">Developed By SDARJO SOFTSPOKEN</p>
            </div>
        </div>
    </div>

</body>
</html>
