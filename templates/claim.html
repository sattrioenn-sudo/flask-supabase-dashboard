<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus WiFi - Claim Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">

    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'Masukkan nama dulu bro!'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                if (res.ok) {
                    this.voucher = result.data;
                } else {
                    this.errorMsg = result.message;
                }
            } catch (e) {
                this.errorMsg = 'Gagal terhubung ke server.';
            } finally {
                this.loading = false;
            }
        }
    }" class="w-full max-w-sm text-center">

        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 relative overflow-hidden">
            <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-indigo-100">
                <span class="text-white font-bold text-2xl">N</span>
            </div>

            <div x-show="!voucher">
                <h1 class="text-2xl font-black text-slate-800 mb-2">WiFi Portal</h1>
                <p class="text-sm text-slate-400 mb-8">Masukkan nama terdaftar untuk melihat kode voucher.</p>
                
                <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Siapa nama kamu?" 
                       class="w-full p-5 bg-slate-50 border-none rounded-2xl text-center font-bold text-slate-700 focus:ring-2 focus:ring-indigo-500 transition-all placeholder:font-medium mb-4">
                
                <button @click="getVoucher()" :disabled="loading"
                        class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-200 hover:bg-indigo-700 active:scale-95 transition-all disabled:opacity-50">
                    <span x-show="!loading">Cek Voucher Saya</span>
                    <span x-show="loading" class="flex items-center justify-center gap-2 italic text-sm">
                        Sedang mencari...
                    </span>
                </button>
                
                <p x-text="errorMsg" class="text-red-500 text-xs font-bold mt-4" x-show="errorMsg" x-cloak></p>
            </div>

            <div x-show="voucher" x-cloak class="animate-in fade-in zoom-in duration-500">
                <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">Voucher Ditemukan!</p>
                <h2 class="text-lg font-bold text-slate-800 mb-6" x-text="'Halo, ' + voucher.user_name"></h2>
                
                <div class="py-8 bg-slate-50 rounded-[2.5rem] border-2 border-dashed border-slate-200 mb-6 group relative">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2">Kode WiFi</p>
                    <h1 class="text-4xl font-black text-slate-900 tracking-tighter" x-text="voucher.voucher_code"></h1>
                </div>

                <div class="flex items-center justify-center gap-4 text-xs font-bold text-slate-500 mb-8">
                    <span class="px-3 py-1 bg-emerald-50 text-emerald-600 rounded-full" x-text="voucher.speed"></span>
                    <span class="px-3 py-1 bg-slate-100 rounded-full" x-text="voucher.location"></span>
                </div>
                
                <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Kode disalin!')" 
                        class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">
                    Salin Kode
                </button>
                
                <button @click="voucher = null; inputName = ''" class="mt-4 text-xs font-bold text-slate-400 hover:text-indigo-600 transition-colors">
                    Cek nama lain
                </button>
            </div>
        </div>
        
        <p class="mt-8 text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">DESIGN BY SATRIO EKO</p>
    </div>

</body>
</html>
