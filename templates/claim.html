<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Kemasan Ciptatama Sempurna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #030712; 
            overflow-x: hidden;
        }
        [x-cloak] { display: none !important; }

        /* Background premium dengan gradien bergerak halus */
        .bg-kcs-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 50%, rgba(14, 165, 233, 0.15) 0%, rgba(3, 7, 18, 1) 100%),
                        linear-gradient(rgba(3, 7, 18, 0.6), rgba(3, 7, 18, 0.6)), 
                        url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1920');
            background-size: cover;
            background-position: center;
        }
        
        .bg-kcs-container img {
            max-width: 65%;
            max-height: 30%;
            object-fit: contain;
            opacity: 0.25;
            filter: brightness(0) invert(1) drop-shadow(0 0 20px rgba(14, 165, 233, 0.2));
        }

        .marquee-glass {
            background: rgba(3, 7, 18, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 35s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Card Modern Glassmorphism dengan border cahaya tipis */
        .card-kcs {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        /* Animasi kilau mewah pada kartu token */
        .shiny-voucher-kcs {
            background: linear-gradient(135deg, #0284c7 0%, #0ea5e9 40%, #38bdf8 50%, #0ea5e9 60%, #0284c7 100%);
            background-size: 250% 100%;
            animation: shimmer 4s infinite linear;
            box-shadow: 0 15px 35px -5px rgba(14, 165, 233, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .custom-glow-input:focus {
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.25);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative">

    <div class="bg-kcs-container">
        <img src="https://imgs.search.brave.com/yrr_jlT-frCPUQ5xMZ2xxCHFuFN5NIH_D5Dmtcb2kJw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9rZW1h/c2FuY2lwdGEuY29t/L3dwLWNvbnRlbnQv/dXBsb2Fkcy8yMDIx/LzAxL2Nyb3BwZWQt/Y3JvcHBlZC1XRUJT/SVRFLUtDUy1sb2dv/LTIwMjUucG5n" alt="Logo KCS">
    </div>

    <!-- Top Running Text Banner -->
    <div class="fixed top-0 left-0 w-full marquee-glass z-50 py-3.5">
        <div class="marquee-text">
            <span class="text-white/80 font-semibold text-[11px] tracking-[0.2em] uppercase">
                PT. Kemasan Ciptatama Sempurna Wi-Fi Service — Please enter your name to claim your voucher — Use internet wisely for productivity — Support: IT Department (08113219556) —
            </span>
        </div>
    </div>

    <!-- Main Container -->
    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        showNotif: false,
        launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#0ea5e9', '#ffffff', '#075985']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'NAMA DIPERLUKAN'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'VOUCHER SUDAH DICLAIM HUBUNGI TIM IT';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.showNotif = true;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    let serverMsg = result.message ? result.message.toUpperCase() : '';
                    if (serverMsg.includes('BLOKIR') || serverMsg.includes('TERPAKAI') || serverMsg.includes('CLAIM') || serverMsg.includes('LIMIT')) {
                        this.errorMsg = 'VOUCHER SUDAH DICLAIM HUBUNGI TIM IT';
                    } else {
                        this.errorMsg = serverMsg || 'GAGAL MENGAMBIL VOUCHER.';
                    }
                }
            } catch (e) {
                this.errorMsg = 'SERVER OFFLINE.';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) { console.error('Lock failed'); }
        }
    }" class="w-full max-w-[380px] mt-12">

        <div class="card-kcs p-8 relative overflow-hidden transition-all duration-300">
            
            <!-- FORM STATE: UNCLAIMED -->
            <template x-if="!voucher">
                <div class="transition-all duration-500 ease-out">
                    <!-- Icon Box Wrapper -->
                    <div class="relative w-16 h-16 mx-auto mb-6">
                        <div class="absolute inset-0 bg-sky-500/20 blur-xl rounded-full animate-pulse"></div>
                        <div class="relative bg-white/5 border border-white/10 rounded-2xl w-full h-full flex items-center justify-center backdrop-blur-md">
                            <svg class="w-8 h-8 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </div>
                    </div>

                    <!-- Header Title -->
                    <div class="text-center mb-8">
                        <h1 class="text-xl font-extrabold text-white tracking-wide uppercase">KEMASAN <span class="text-sky-400">CIPTA</span></h1>
                        <p class="text-[9px] font-bold text-white/40 uppercase tracking-[0.35em] mt-1.5">Wi-Fi Access Portal</p>
                    </div>
                    
                    <!-- Input & Button Fields -->
                    <div class="space-y-4">
                        <div class="relative">
                            <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Masukkan Nama Anda" 
                                   class="custom-glow-input w-full bg-slate-950/60 backdrop-blur-md border border-white/10 rounded-xl py-4 px-5 text-center font-semibold text-sm text-white placeholder:text-white/20 focus:bg-slate-950/90 focus:border-sky-500 transition-all outline-none">
                        </div>
                        
                        <button @click="getVoucher()" :disabled="loading"
                                class="w-full py-4 bg-sky-500 text-white rounded-xl font-bold text-xs tracking-[0.15em] uppercase hover:bg-sky-400 active:scale-[0.98] disabled:opacity-40 transition-all duration-200 shadow-lg shadow-sky-500/20">
                            <span x-show="!loading" class="flex items-center justify-center gap-2">
                                CLAIM VOUCHER
                            </span>
                            <span x-show="loading" class="flex items-center justify-center gap-2.5">
                                <svg class="animate-spin h-3.5 w-3.5 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                PROCESSING...
                            </span>
                        </button>
                    </div>

                    <!-- Error Alert View -->
                    <div x-show="errorMsg" x-transition class="mt-4 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-center">
                        <p x-text="errorMsg" class="text-red-400 text-[10px] font-bold tracking-wider uppercase"></p>
                    </div>
                </div>
            </template>

            <!-- VOUCHER DISPLAY STATE -->
            <template x-if="voucher">
                <div class="transition-all duration-500 ease-out">
                    <!-- Status Chip -->
                    <div x-show="showNotif" class="bg-emerald-500/10 backdrop-blur-md flex items-center justify-center gap-2 px-4 py-1.5 rounded-full mb-6 mx-auto w-fit border border-emerald-500/20">
                        <span class="flex h-1.5 w-1.5 rounded-full bg-emerald-400 animate-ping"></span>
                        <span class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest">Access Granted</span>
                    </div>

                    <!-- Welcome Text -->
                    <h2 class="text-base font-medium text-white/80 text-center mb-6 leading-relaxed">
                        Halo, Selamat Bekerja!<br>
                        <span x-text="voucher.user_name" class="text-sky-400 font-extrabold uppercase text-lg tracking-wide"></span>
                    </h2>
                    
                    <!-- Shiny Token Component -->
                    <div class="shiny-voucher-kcs rounded-2xl py-8 px-4 mb-5 cursor-pointer text-center active:scale-[0.98] transition-transform duration-200" 
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Token Copied!')">
                        <p class="text-[9px] font-bold text-white/70 uppercase tracking-[0.25em] mb-1.5">Your Wi-Fi Token</p>
                        <h1 class="text-3xl font-black text-white tracking-wider drop-shadow-[0_4px_12px_rgba(0,0,0,0.3)]" x-text="voucher.voucher_code"></h1>
                    </div>

                    <!-- Details Stats Grid -->
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="p-3 bg-white/[0.03] backdrop-blur-md rounded-xl border border-white/5 text-center">
                            <p class="text-white/30 font-semibold uppercase mb-1 tracking-wider" style="font-size: 8px;">Network Speed</p>
                            <p class="font-bold text-sky-400 text-xs" x-text="voucher.speed ? (voucher.speed.toLowerCase().includes('mbps') ? voucher.speed : voucher.speed + ' Mbps') : 'High Speed'"></p>
                        </div>
                        <div class="p-3 bg-white/[0.03] backdrop-blur-md rounded-xl border border-white/5 text-center">
                            <p class="text-white/30 font-semibold uppercase mb-1 tracking-wider" style="font-size: 8px;">Scan Location</p>
                            <p class="font-bold text-emerald-400 text-xs uppercase tracking-wide" x-text="voucher.location || 'Area Kantor'"></p>
                        </div>
                    </div>
                    
                    <!-- Interactive Buttons -->
                    <div class="space-y-3">
                        <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Token Berhasil disalin!')" 
                                class="w-full py-3.5 bg-white text-slate-950 rounded-xl font-bold text-xs tracking-wider shadow-xl hover:bg-slate-100 transition-colors duration-200">
                            COPY TOKEN
                        </button>
                        
                        <button @click="voucher = null; inputName = ''; showNotif = false" 
                                class="w-full pt-2 text-[9px] font-bold text-white/20 hover:text-white/60 uppercase tracking-[0.2em] text-center transition-colors duration-200">
                            Clear & Exit
                        </button>
                    </div>
                </div>
            </template>
        </div>
        
        <!-- Footer Watermark -->
        <div class="mt-8 text-center">
            <div class="inline-block px-6 py-2.5 bg-slate-950/40 backdrop-blur-md rounded-full border border-white/5 shadow-sm">
                <p class="text-[9px] font-semibold text-white/30 uppercase tracking-[0.35em]">Developed By IT SATRIO</p>
            </div>
        </div>
    </div>
</body>
</html>
