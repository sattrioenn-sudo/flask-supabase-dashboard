<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT. Kemasan Ciptatama Sempurna</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #dbeafe; /* Latar belakang dasar biru muda es */
            overflow: hidden;
        }
        [x-cloak] { display: none !important; }

        /* Latar Belakang Gradasi Halus Biru Muda */
        .bg-kcs-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #dbeafe;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.3) 0px, transparent 60%),
                radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.25) 0px, transparent 60%);
        }
        
        /* Logo KCS di background dibuat sedikit lebih gelap (biru tua redup) agar kontras dengan latar biru muda */
        .bg-kcs-container img {
            max-width: 70%;
            max-height: 35%;
            object-fit: contain;
            opacity: 0.08;
            filter: brightness(0.2) contrast(1.2);
        }

        /* Marquee: Glassmorphic dengan nuansa biru muda transparan */
        .marquee-glass {
            background: rgba(219, 234, 254, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(147, 197, 253, 0.4);
        }
        
        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: marquee 35s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* Kartu Utama: Diubah ke Glassmorphism Biru Muda untuk kontras yang sempurna */
        .card-kcs {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(147, 197, 253, 0.5);
            box-shadow: 0 12px 40px 0 rgba(37, 99, 235, 0.15);
            border-radius: 2.5rem;
        }

        /* Tombol Voucher Berkilau */
        .shiny-voucher-kcs {
            background: linear-gradient(110deg, #1d4ed8 0%, #3b82f6 50%, #1d4ed8 100%);
            background-size: 200% 100%;
            animation: shimmer 3s infinite linear;
            box-shadow: 0 10px 25px -5px rgba(29, 78, 216, 0.4);
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Canvas untuk Jaring-Jaring Interaktif */
        #mesh-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Canvas Jaring-jaring Efek Interaktif yang mengikuti Mouse -->
    <canvas id="mesh-canvas"></canvas>

    <div class="bg-kcs-container">
        <img src="https://imgs.search.brave.com/yrr_jlT-frCPUQ5xMZ2xxCHFuFN5NIH_D5Dmtcb2kJw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9rZW1h/c2FuY2lwdGEuY29t/L3dwLWNvbnRlbnQv/dXBsb2Fkcy8yMDIx/LzAxL2Nyb3BwZWQt/Y3JvcHBlZC1XRUJT/SVRFLUtDUy1sb2dv/LTIwMjUucG5n" alt="Logo KCS">
    </div>

    <!-- Banner Info Atas -->
    <div class="fixed top-0 w-full marquee-glass z-50 py-3">
        <div class="marquee-text">
            <!-- Warna teks diubah ke biru tua gelap agar mudah dibaca di atas background biru muda -->
            <span class="text-blue-900 font-extrabold text-[11px] tracking-[0.25em] uppercase">
                PT. Kemasan Ciptatama Sempurna Wi-Fi Service — Please enter your name to claim your voucher — Use internet wisely for productivity — Support: IT Department (08113219556) —
            </span>
        </div>
    </div>

    <!-- Container Utama (z-10 agar berada di atas canvas jaring-jaring) -->
    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        showNotif: false,
        launchConfetti() {
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#1d4ed8', '#ffffff', '#1e3a8a']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'NAMA DIPERLUKAN'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'VOUCHER SUDAH DICLAIM HUBUNGI TIM IT';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.showNotif = true;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    let serverMsg = result.message ? result.message.toUpperCase() : '';
                    if (serverMsg.includes('BLOKIR') || serverMsg.includes('TERPAKAI') || serverMsg.includes('CLAIM') || serverMsg.includes('LIMIT')) {
                        this.errorMsg = 'VOUCHER SUDAH DICLAIM HUBUNGI TIM IT';
                    } else {
                        this.errorMsg = serverMsg || 'GAGAL MENGAMBIL VOUCHER.';
                    }
                }
            } catch (e) {
                this.errorMsg = 'SERVER OFFLINE.';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) { console.error('Lock failed'); }
        }
    }" class="w-full max-w-sm z-10">

        <div class="card-kcs p-10 relative overflow-hidden group">
            <template x-if="!voucher">
                <div class="animate-in fade-in zoom-in duration-500">
                    <div class="relative w-20 h-20 mx-auto mb-8">
                        <div class="absolute inset-0 bg-blue-500 blur-2xl opacity-30 animate-pulse"></div>
                        <div class="relative bg-blue-600/10 border border-blue-400/30 rounded-2xl w-full h-full flex items-center justify-center">
                            <!-- Icon diubah menjadi Biru Tua agar kontras -->
                            <svg class="w-10 h-10 text-blue-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></path>
                            </svg>
                        </div>
                    </div>

                    <div class="text-center mb-10">
                        <h1 class="text-2xl font-extrabold text-blue-950 tracking-tight">KEMASAN <span class="text-blue-600">CIPTA</span></h1>
                        <p class="text-[10px] font-bold text-blue-800/60 uppercase tracking-[0.3em] mt-1">Wi-Fi Access Portal</p>
                    </div>
                    
                    <div class="space-y-4">
                        <!-- Input field disesuaikan ke tema biru es halus dengan teks tebal -->
                        <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Input Your Name" 
                               class="w-full bg-blue-50/70 border border-blue-300 rounded-2xl py-4 px-6 text-center font-bold text-blue-950 placeholder:text-blue-400 focus:bg-white focus:border-blue-500 transition-all outline-none">
                        
                        <!-- Tombol Claim dengan warna biru tua yang tegas -->
                        <button @click="getVoucher()" :disabled="loading"
                                class="w-full py-5 bg-blue-700 text-white rounded-2xl font-black text-xs tracking-[0.2em] uppercase hover:bg-blue-800 shadow-xl shadow-blue-500/20 active:scale-95 disabled:opacity-50 transition-all">
                            <span x-show="!loading">CLAIM VOUCHER</span>
                            <span x-show="loading" class="flex items-center justify-center gap-3">
                                <svg class="animate-spin h-4 w-4 text-white" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                                PROCESSING
                            </span>
                        </button>
                    </div>
                    <!-- Error text warna merah kontras -->
                    <p x-show="errorMsg" x-text="errorMsg" class="mt-6 text-center text-red-600 text-[10px] font-black tracking-widest"></p>
                </div>
            </template>

            <template x-if="voucher">
                <div class="animate-in slide-in-from-bottom-8 duration-500">
                    <div x-show="showNotif" class="bg-blue-600/10 flex items-center justify-center gap-2 px-4 py-2 rounded-full mb-6 mx-auto w-fit border border-blue-400/40">
                        <span class="flex h-2 w-2 rounded-full bg-blue-600 animate-ping"></span>
                        <span class="text-[10px] font-extrabold text-blue-700 uppercase">Access Granted</span>
                    </div>

                    <h2 class="text-xl font-bold text-blue-950 text-center mb-8">
                        Halo, Selamat Bekerja! <br>
                        <span x-text="voucher.user_name" class="text-blue-700 font-black uppercase"></span>
                    </h2>
                    
                    <div class="shiny-voucher-kcs rounded-[2rem] py-10 px-4 mb-6 cursor-pointer text-center" 
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Token Copied!')">
                        <p class="text-[9px] font-bold text-white/80 uppercase tracking-[0.3em] mb-2">Your Wi-Fi Token</p>
                        <h1 class="text-4xl font-black text-white tracking-[0.1em] drop-shadow-2xl" x-text="voucher.voucher_code"></h1>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="p-4 bg-blue-50/60 rounded-2xl border border-blue-300/60 text-center">
                            <p class="text-blue-900/50 font-bold uppercase mb-1" style="font-size: 8px;">Network Speed</p>
                            <p class="font-black text-blue-700 text-xs" x-text="voucher.speed ? (voucher.speed.toLowerCase().includes('mbps') ? voucher.speed : voucher.speed + ' Mbps') : 'High Speed'"></p>
                        </div>
                        <div class="p-4 bg-blue-50/60 rounded-2xl border border-blue-300/60 text-center">
                            <p class="text-blue-900/50 font-bold uppercase mb-1" style="font-size: 8px;">Scan Location</p>
                            <p class="font-black text-green-700 text-xs uppercase" x-text="voucher.location || 'Area Kantor'"></p>
                        </div>
                    </div>
                    
                    <!-- Tombol aksi diubah agar senada dengan UI -->
                    <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Token Berhasil disalin!')" 
                            class="w-full py-4 bg-blue-700 text-white rounded-2xl font-black text-[11px] tracking-widest shadow-lg shadow-blue-500/20 hover:bg-blue-800 transition-all">
                        COPY TOKEN
                    </button>
                    
                    <button @click="voucher = null; inputName = ''; showNotif = false" class="w-full mt-6 text-[9px] font-bold text-blue-900/40 hover:text-blue-800 uppercase tracking-widest text-center transition-colors">
                        Clear & Exit
                    </button>
                </div>
            </template>
        </div>
        
        <div class="mt-12 text-center">
            <div class="inline-block px-8 py-3 bg-blue-50/60 shadow-sm rounded-full border border-blue-300/50">
                <p class="text-[10px] font-bold text-blue-900/60 uppercase tracking-[0.4em]">Developed By IT KEMASAN</p>
            </div>
        </div>
    </div>

    <!-- SCRIPT JARING-JARING INTERAKTIF (WARNA BIRU SENADA & MENGIKUTI MOUSE) -->
    <script>
        const canvas = document.getElementById('mesh-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particles = [];
        const maxParticles = 85;          
        const connectionDistance = 130;  
        const mouse = { x: null, y: null, radius: 185 }; 

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.55; 
                this.vy = (Math.random() - 0.5) * 0.55;
                this.radius = Math.random() * 2.5 + 1.5; 
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        let force = (mouse.radius - dist) / mouse.radius;
                        this.x += (dx / dist) * force * 1.5;
                        this.y += (dy / dist) * force * 1.5;
                    }
                }
            }

            draw() {
                ctx.fillStyle = 'rgba(29, 78, 216, 0.7)'; 
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < connectionDistance) {
                        let alpha = (1 - dist / connectionDistance) * 0.45;
                        ctx.strokeStyle = `rgba(37, 99, 235, ${alpha})`;
                        ctx.lineWidth = 1.1; 
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }

                if (mouse.x !== null && mouse.y !== null) {
                    let dx = particles[i].x - mouse.x;
                    let dy = particles[i].y - mouse.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < mouse.radius) {
                        let alpha = (1 - dist / mouse.radius) * 0.6;
                        ctx.strokeStyle = `rgba(29, 78, 216, ${alpha})`;
                        ctx.lineWidth = 1.4;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(mouse.x, mouse.y);
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
