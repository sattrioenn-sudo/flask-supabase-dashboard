<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Access | PT. KCS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }
        [x-cloak] { display: none !important; }

        /* Subtle Gradient Background */
        .bg-soft-blue {
            background: radial-gradient(circle at top right, #e0f2fe 0%, #f8fafc 50%);
        }

        .input-line {
            background: transparent;
            border-bottom: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .input-line:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .btn-blue {
            background: #3b82f6;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-blue:hover {
            background: #2563eb;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 bg-soft-blue">

    <div x-data="{ 
        inputName: '', 
        voucher: null, 
        loading: false, 
        errorMsg: '',
        launchConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.7 },
                colors: ['#3b82f6', '#ffffff', '#93c5fd']
            });
        },
        async getVoucher() {
            if(!this.inputName) { this.errorMsg = 'SILAHKAN MASUKKAN NAMA'; return; }
            this.loading = true;
            this.errorMsg = '';
            try {
                const res = await fetch('/api/get-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_name: this.inputName })
                });
                const result = await res.json();
                
                if (res.ok) {
                    const statusLock = result.data.is_locked;
                    if (statusLock === true || statusLock === 1 || statusLock === 'true') {
                        this.errorMsg = 'VOUCHER TELAH DIGUNAKAN';
                        this.voucher = null;
                    } else {
                        this.voucher = result.data;
                        this.launchConfetti();
                        this.lockVoucher(result.data.id);
                    }
                } else {
                    this.errorMsg = result.message.toUpperCase();
                }
            } catch (e) {
                this.errorMsg = 'MASALAH JARINGAN';
            } finally {
                this.loading = false;
            }
        },
        async lockVoucher(id) {
            try {
                await fetch('/api/lock-voucher', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: id })
                });
            } catch (e) { console.error('Lock failed'); }
        }
    }" class="w-full max-w-sm">

        <div class="mb-12 text-center">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-white rounded-2xl shadow-sm border border-blue-50 mb-4">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0"></path>
                </svg>
            </div>
            <h1 class="text-xs font-bold tracking-[0.4em] text-blue-400 uppercase">PT. KCS Portal</h1>
        </div>

        <div class="bg-white/80 backdrop-blur-md p-10 rounded-[2.5rem] border border-white shadow-xl shadow-blue-900/5">
            
            <template x-if="!voucher">
                <div class="space-y-8 animate-in fade-in duration-500">
                    <div class="text-center space-y-2">
                        <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Welcome</h2>
                        <p class="text-sm text-slate-400">Please identify yourself to connect.</p>
                    </div>

                    <div class="pt-4">
                        <input type="text" x-model="inputName" @keyup.enter="getVoucher()" placeholder="Your full name" 
                               class="input-line w-full py-3 text-center text-lg font-medium placeholder:text-slate-300">
                    </div>
                    
                    <button @click="getVoucher()" :disabled="loading"
                            class="btn-blue w-full py-4 rounded-2xl font-bold text-[11px] tracking-[0.15em] uppercase shadow-md disabled:opacity-50">
                        <span x-show="!loading">Request Access</span>
                        <span x-show="loading" class="flex items-center justify-center gap-2">
                            <svg class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
                            Verifying...
                        </span>
                    </button>

                    <div x-show="errorMsg" x-cloak class="mt-4">
                        <p x-text="errorMsg" class="text-red-400 text-[10px] font-bold text-center tracking-widest"></p>
                    </div>
                </div>
            </template>

            <template x-if="voucher">
                <div class="text-center animate-in zoom-in duration-300">
                    <div class="mb-8">
                        <span class="px-3 py-1 bg-green-50 text-green-500 text-[10px] font-bold uppercase tracking-wider rounded-full border border-green-100">
                            Verified Connection
                        </span>
                    </div>

                    <div class="mb-8 p-6 bg-blue-50/50 rounded-3xl border border-blue-100/50 group cursor-pointer"
                         @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Copied!')">
                        <p class="text-blue-400/60 text-[9px] font-bold uppercase tracking-[0.2em] mb-2">Voucher Code</p>
                        <p class="text-4xl font-bold text-blue-600 tracking-widest" x-text="voucher.voucher_code"></p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="p-3 bg-slate-50 rounded-2xl border border-slate-100 text-left">
                            <p class="text-[8px] text-slate-400 uppercase font-bold">Speed</p>
                            <p class="text-xs font-bold text-slate-700" x-text="voucher.speed || '15 Mbps'"></p>
                        </div>
                        <div class="p-3 bg-slate-50 rounded-2xl border border-slate-100 text-left">
                            <p class="text-[8px] text-slate-400 uppercase font-bold">Zone</p>
                            <p class="text-xs font-bold text-slate-700" x-text="voucher.location || 'All Area'"></p>
                        </div>
                    </div>

                    <button @click="navigator.clipboard.writeText(voucher.voucher_code); alert('Code Copied!')" 
                            class="text-[11px] font-bold tracking-widest uppercase border-2 border-blue-500 text-blue-500 w-full py-4 rounded-2xl hover:bg-blue-500 hover:text-white transition-all">
                        Copy to Clipboard
                    </button>
                    
                    <button @click="voucher = null; inputName = ''" class="mt-8 text-slate-400 hover:text-red-400 text-[10px] font-bold uppercase tracking-widest transition-colors">
                        Close Session
                    </button>
                </div>
            </template>
        </div>

        <div class="mt-12 text-center">
            <p class="text-[10px] font-bold text-slate-400/60 uppercase tracking-[0.4em]">Developed by IT Satrio</p>
        </div>
    </div>

</body>
</html>
